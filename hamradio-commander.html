// ─── UTILITY FUNCTIONS ────────────────────────────────────
function toRad(d){return d*Math.PI/180}
function toDeg(r){return r*180/Math.PI}
function greatCircleDist(lat1,lon1,lat2,lon2){
  const R=6371;
  const dLat=toRad(lat2-lat1),dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function greatCirclePoints(lat1,lon1,lat2,lon2,n=100){
  const pts=[];
  const φ1=toRad(lat1),λ1=toRad(lon1),φ2=toRad(lat2),λ2=toRad(lon2);
  const d=2*Math.asin(Math.sqrt(Math.sin((φ1-φ2)/2)**2+Math.cos(φ1)*Math.cos(φ2)*Math.sin((λ1-λ2)/2)**2));
  for(let i=0;i<=n;i++){
    const f=i/n;
    const A=Math.sin((1-f)*d)/Math.sin(d)||0;
    const B=Math.sin(f*d)/Math.sin(d)||0;
    const x=A*Math.cos(φ1)*Math.cos(λ1)+B*Math.cos(φ2)*Math.cos(λ2);
    const y=A*Math.cos(φ1)*Math.sin(λ1)+B*Math.cos(φ2)*Math.sin(λ2);
    const z=A*Math.sin(φ1)+B*Math.sin(φ2);
    pts.push([toDeg(Math.atan2(z,Math.sqrt(x*x+y*y))),toDeg(Math.atan2(y,x))]);
  }
  return pts;
}
function solarSubPoint(){
  const now=new Date();
  const jd=now.getTime()/86400000+2440587.5;
  const n=jd-2451545.0;
  const L=(280.46+0.9856474*n)%360;
  const g=toRad((357.528+0.9856003*n)%360);
  const λ=toRad(L+1.915*Math.sin(g)+0.02*Math.sin(2*g));
  const ε=toRad(23.439-0.0000004*n);
  const decl=toDeg(Math.asin(Math.sin(ε)*Math.sin(λ)));
  const hours=now.getUTCHours()+now.getUTCMinutes()/60+now.getUTCSeconds()/3600;
  const ra=toDeg(Math.atan2(Math.cos(ε)*Math.sin(λ),Math.cos(λ)));
  const gmst=(280.46061837+360.98564736629*n)%360;
  const lon=((ra-gmst+540)%360)-180;
  return{lat:decl,lon};
}
function isNightAt(lat,lon,sunLat,sunLon){
  const d=greatCircleDist(lat,lon,sunLat,sunLon);
  return d>6371*Math.PI/2*0.95;
}

// ─── PROPAGATION MODEL ───────────────────────────────────
function estimateMUF(sfi, kIndex, distKm, isNight, sunAngle){
  // Simplified MUF estimation
  const foF2Base = 0.004 * sfi + 1.8;
  const nightFactor = isNight ? 0.45 : 1.0;
  const kFactor = Math.max(0.3, 1 - kIndex * 0.08);
  const foF2 = foF2Base * nightFactor * kFactor;
  // Number of hops
  const hops = Math.max(1, Math.ceil(distKm / 3500));
  // Elevation angle approximation
  const hopDist = distKm / hops;
  const elevAngle = Math.max(3, 90 - (hopDist / 80));
  const secant = 1 / Math.cos(toRad(90 - elevAngle));
  const muf = foF2 * Math.min(secant, 4.5);
  return Math.max(2, Math.min(muf, 50));
}

function estimateLUF(kIndex, distKm, isNight){
  const base = isNight ? 1.5 : 3.0;
  const kFactor = 1 + kIndex * 0.3;
  const distFactor = 1 + (distKm / 15000) * 0.5;
  return base * kFactor * distFactor;
}

function calcPropagation(params){
  const {txLat,txLon,rxLat,rxLon,freqMHz,powerW,txGain,rxGain,sfi,kIndex,mode} = params;
  const dist = greatCircleDist(txLat,txLon,rxLat,rxLon);
  const sun = solarSubPoint();
  const midLat = (txLat+rxLat)/2, midLon = (txLon+rxLon)/2;
  const night = isNightAt(midLat,midLon,sun.lat,sun.lon);
  const muf = estimateMUF(sfi,kIndex,dist,night,0);
  const luf = estimateLUF(kIndex,dist,night);

  const hops = Math.max(1, Math.ceil(dist/3500));
  // Ionospheric path loss (simplified)
  const absLoss = night ? 5 : 15 + kIndex*3;
  const hopLoss = hops * (absLoss + 10 + 20*Math.log10(freqMHz/10));
  const spreadLoss = 20*Math.log10(Math.max(dist,100)) + 20*Math.log10(freqMHz) - 27.55;
  const totalLoss = spreadLoss + hopLoss*0.3;

  const eirp = 10*Math.log10(powerW*1000) + txGain;
  const rxPower = eirp - totalLoss + rxGain;

  const modeBw = mode ? mode.bw : 2400;
  const modeSnrReq = mode ? mode.snrReq : 10;
  const noisePower = -174 + 10*Math.log10(modeBw) + 30; // 30dB atmospheric noise at HF
  const snr = rxPower - noisePower;
  const margin = snr - modeSnrReq;

  let probability = 0;
  if(freqMHz >= luf && freqMHz <= muf){
    const freqMargin = Math.min((freqMHz-luf)/(muf-luf),(muf-freqMHz)/(muf-luf))*2;
    probability = Math.min(0.95, Math.max(0, (margin+20)/40) * Math.min(1,freqMargin+0.3));
  }
  probability = Math.max(0, Math.min(0.99, probability));

  return {dist,muf,luf,hops,snr:snr.toFixed(1),margin:margin.toFixed(1),probability,night,rxPower:rxPower.toFixed(1),totalLoss:totalLoss.toFixed(0)};
}

function getBandCondition(band, sfi, kIndex, isNight){
  const muf1000 = estimateMUF(sfi, kIndex, 1000, isNight, 0);
  const muf3000 = estimateMUF(sfi, kIndex, 3000, isNight, 0);
  const muf5000 = estimateMUF(sfi, kIndex, 5000, isNight, 0);
  const luf = estimateLUF(kIndex, 3000, isNight);
  const freq = band.freq;

  if(freq > muf1000 && freq > muf3000) return {status:"CLOSED",color:"#f85149"};
  if(freq > muf3000 || freq < luf) return {status:"POOR",color:"#f85149"};
  if(freq > muf5000*0.9 || kIndex >= 5) return {status:"FAIR",color:"#d29922"};
  if(freq <= muf5000 && freq >= luf && kIndex < 3) return {status:"GOOD",color:"#3fb950"};
  return {status:"FAIR",color:"#d29922"};
}

function parseSolarXML(xml){
  const get=(tag)=>{const m=xml.match(new RegExp(`<${tag}>([^<]*)</${tag}>`));return m?m[1].trim():null};
  const sfi=parseFloat(get("solarflux"))||DEFAULT_SOLAR.sfi;
  const sn=parseInt(get("sunspots"))||DEFAULT_SOLAR.sn;
  const aIndex=parseInt(get("aindex"))||DEFAULT_SOLAR.aIndex;
  const kIndex=parseInt(get("kindex"))||DEFAULT_SOLAR.kIndex;
  const bz=parseFloat(get("magneticfield"))||DEFAULT_SOLAR.bz;
  const solarWind=parseFloat(get("solarwind"))||DEFAULT_SOLAR.solarWind;
  const xray=get("xray")||DEFAULT_SOLAR.xray;
  const protonFlux=parseFloat(get("protonflux"))||DEFAULT_SOLAR.protonFlux;
  const geoStorm=get("geomagfield")||DEFAULT_SOLAR.geoStorm;
  const sigNoise=get("signalnoise")||DEFAULT_SOLAR.sigNoise;
  return{sfi,sn,aIndex,kIndex,bz,solarWind,xray,protonFlux,geoStorm,sigNoise,electronFlux:DEFAULT_SOLAR.electronFlux,updated:new Date().toISOString(),source:"HAMQSL"};
}

// ─── SPARKLINE COMPONENT ─────────────────────────────────
const Sparkline = memo(({data,width=120,height=30,color="#58a6ff",filled=false})=>{
  const canvasRef=useRef(null);
  useEffect(()=>{
    const c=canvasRef.current;if(!c||!data.length)return;
    const ctx=c.getContext("2d");
    const dpr=window.devicePixelRatio||1;
    c.width=width*dpr;c.height=height*dpr;
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,width,height);
    const min=Math.min(...data),max=Math.max(...data);
    const range=max-min||1;
    const step=width/(data.length-1||1);
    ctx.beginPath();
    data.forEach((v,i)=>{
      const x=i*step,y=height-((v-min)/range)*(height-4)-2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.stroke();
    if(filled){
      ctx.lineTo((data.length-1)*step,height);ctx.lineTo(0,height);ctx.closePath();
      ctx.fillStyle=color+"18";ctx.fill();
    }
  },[data,width,height,color,filled]);
  return React.createElement("canvas",{ref:canvasRef,style:{width,height,display:"block"}});
});

// ─── 2D MAP COMPONENT ────────────────────────────────────
function Map2D({txPos,rxPos,setTxPos,setRxPos,solar,mapMode,stationConfig}){
  const canvasRef=useRef(null);
  const [dims,setDims]=useState({w:900,h:450});
  const containerRef=useRef(null);

  useEffect(()=>{
    const resize=()=>{
      if(containerRef.current){
        const w=containerRef.current.clientWidth;
        setDims({w,h:Math.round(w*0.5)});
      }
    };
    resize();
    window.addEventListener("resize",resize);
    return()=>window.removeEventListener("resize",resize);
  },[]);

  const lonToX=(lon)=>(lon+180)/360*dims.w;
  const latToY=(lat)=>(90-lat)/180*dims.h;
  const xToLon=(x)=>(x/dims.w)*360-180;
  const yToLat=(y)=>90-(y/dims.h)*180;

  const handleClick=useCallback((e)=>{
    const rect=canvasRef.current.getBoundingClientRect();
    const x=(e.clientX-rect.left)*(dims.w/rect.width);
    const y=(e.clientY-rect.top)*(dims.h/rect.height);
    const lat=parseFloat(yToLat(y).toFixed(2));
    const lon=parseFloat(xToLon(x).toFixed(2));
    if(mapMode==="tx"||(!txPos&&mapMode!=="rx")){setTxPos({lat,lon})}
    else{setRxPos({lat,lon})}
  },[dims,mapMode,txPos]);

  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext("2d");
    const dpr=window.devicePixelRatio||1;
    c.width=dims.w*dpr;c.height=dims.h*dpr;
    ctx.scale(dpr,dpr);
    // Background
    ctx.fillStyle="#080b10";ctx.fillRect(0,0,dims.w,dims.h);

    // Grid
    ctx.strokeStyle="#1a1f27";ctx.lineWidth=0.5;
    for(let lon=-180;lon<=180;lon+=30){const x=lonToX(lon);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,dims.h);ctx.stroke()}
    for(let lat=-90;lat<=90;lat+=30){const y=latToY(lat);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(dims.w,y);ctx.stroke()}
    // Equator & prime meridian
    ctx.strokeStyle="#21262d";ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,latToY(0));ctx.lineTo(dims.w,latToY(0));ctx.stroke();
    ctx.beginPath();ctx.moveTo(lonToX(0),0);ctx.lineTo(lonToX(0),dims.h);ctx.stroke();

    // Day/night terminator
    const sun=solarSubPoint();
    for(let px=0;px<dims.w;px+=3){
      for(let py=0;py<dims.h;py+=3){
        const lt=yToLat(py),ln=xToLon(px);
        if(isNightAt(lt,ln,sun.lat,sun.lon)){
          ctx.fillStyle="rgba(0,0,0,0.35)";ctx.fillRect(px,py,3,3);
        }
      }
    }
    // Sun position marker
    const sunX=lonToX(sun.lon),sunY=latToY(sun.lat);
    ctx.fillStyle="#d29922";ctx.beginPath();ctx.arc(sunX,sunY,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle="#d2992244";ctx.beginPath();ctx.arc(sunX,sunY,10,0,Math.PI*2);ctx.fill();

    // Continents
    ctx.strokeStyle="#30363d";ctx.lineWidth=1;ctx.fillStyle="#161b2233";
    Object.values(CONTINENTS).forEach(pts=>{
      ctx.beginPath();
      pts.forEach(([lon,lat],i)=>{const x=lonToX(lon),y=latToY(lat);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)});
      ctx.closePath();ctx.fill();ctx.stroke();
    });

    // Heatmap (if TX is set and in heatmap mode)
    if(txPos && !rxPos){
      const band = BANDS.find(b=>b.name===stationConfig.band)||BANDS[4];
      const mode = MODES.find(m=>m.name===stationConfig.mode)||MODES[0];
      const step = Math.max(4, Math.round(dims.w/150));
      for(let px=0;px<dims.w;px+=step){
        for(let py=0;py<dims.h;py+=step){
          const lt=yToLat(py),ln=xToLon(px);
          const dist=greatCircleDist(txPos.lat,txPos.lon,lt,ln);
          if(dist<200||dist>20000)continue;
          const result=calcPropagation({
            txLat:txPos.lat,txLon:txPos.lon,rxLat:lt,rxLon:ln,
            freqMHz:band.freq,powerW:stationConfig.power,
            txGain:ANTENNA_TYPES[stationConfig.antennaIdx].gain,
            rxGain:2.15,sfi:solar.sfi,kIndex:solar.kIndex,mode
          });
          if(result.probability>0.05){
            const p=result.probability;
            let r,g,b;
            if(p<0.3){r=Math.round(p/0.3*60);g=Math.round(100+p/0.3*85);b=Math.round(p/0.3*50)}
            else if(p<0.6){const t=(p-0.3)/0.3;r=Math.round(60+t*150);g=Math.round(185-t*30);b=Math.round(50-t*20)}
            else{const t=(p-0.6)/0.4;r=Math.round(210+t*40);g=Math.round(155-t*80);b=Math.round(30-t*10)}
            ctx.fillStyle=`rgba(${r},${g},${b},${Math.min(0.5,p*0.6)})`;
            ctx.fillRect(px-step/2,py-step/2,step,step);
          }
        }
      }
    }

    // Great circle path
    if(txPos&&rxPos){
      const pts=greatCirclePoints(txPos.lat,txPos.lon,rxPos.lat,rxPos.lon,200);
      ctx.strokeStyle="#58a6ff";ctx.lineWidth=2;ctx.setLineDash([6,4]);
      ctx.beginPath();
      let prevX=null;
      pts.forEach(([lat,lon])=>{
        const x=lonToX(lon),y=latToY(lat);
        if(prevX!==null&&Math.abs(x-prevX)>dims.w/2){ctx.stroke();ctx.beginPath();ctx.moveTo(x,y)}
        else if(prevX===null){ctx.moveTo(x,y)}
        else{ctx.lineTo(x,y)}
        prevX=x;
      });
      ctx.stroke();ctx.setLineDash([]);
    }

    // TX marker
    if(txPos){
      const x=lonToX(txPos.lon),y=latToY(txPos.lat);
      ctx.fillStyle="#f8514933";ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#f85149";ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#f85149";ctx.font="bold 9px monospace";ctx.fillText("TX",x+8,y-6);
      ctx.fillStyle="#8b949e";ctx.font="9px monospace";
      ctx.fillText(`${txPos.lat.toFixed(1)}°, ${txPos.lon.toFixed(1)}°`,x+8,y+4);
    }
    // RX marker
    if(rxPos){
      const x=lonToX(rxPos.lon),y=latToY(rxPos.lat);
      ctx.fillStyle="#3fb95033";ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#3fb950";ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle="#3fb950";ctx.font="bold 9px monospace";ctx.fillText("RX",x+8,y-6);
      ctx.fillStyle="#8b949e";ctx.font="9px monospace";
      ctx.fillText(`${rxPos.lat.toFixed(1)}°, ${rxPos.lon.toFixed(1)}°`,x+8,y+4);
    }

    // Grid labels
    ctx.fillStyle="#484f58";ctx.font="9px monospace";
    for(let lon=-150;lon<=150;lon+=30){ctx.fillText(`${lon}°`,lonToX(lon)+2,dims.h-4)}
    for(let lat=-60;lat<=60;lat+=30){ctx.fillText(`${lat}°`,4,latToY(lat)-2)}

  },[dims,txPos,rxPos,solar,stationConfig]);

  return React.createElement("div",{ref:containerRef,className:"map-container",style:{cursor:"crosshair"}},
    React.createElement("canvas",{ref:canvasRef,style:{width:dims.w,height:dims.h},onClick:handleClick}),
    React.createElement("div",{style:{position:"absolute",bottom:8,right:8}},
      React.createElement("div",{className:"heatmap-legend"},
        React.createElement("span",null,"Low"),
        React.createElement("div",{className:"bar"}),
        React.createElement("span",null,"High"),
        React.createElement("span",{style:{marginLeft:8}},"Contact Prob.")
      )
    ),
    React.createElement("div",{style:{position:"absolute",top:8,left:8,fontSize:9,color:"#484f58"}},
      mapMode==="tx"?"CLICK TO PLACE TX":"CLICK TO PLACE RX"),
  );
}

// ─── 3D GLOBE COMPONENT ─────────────────────────────────
function Globe3D({txPos,rxPos,solar,stationConfig}){
  const mountRef=useRef(null);
  const sceneRef=useRef(null);

  useEffect(()=>{
    if(!mountRef.current)return;
    const container=mountRef.current;
    const w=container.clientWidth,h=500;
    const scene=new THREE.Scene();
    const camera=new THREE.PerspectiveCamera(45,w/h,0.1,1000);
    camera.position.set(0,0,3.2);
    const renderer=new THREE.WebGLRenderer({antialias:true,alpha:true});
    renderer.setSize(w,h);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.setClearColor(0x050810);
    container.appendChild(renderer.domElement);

    // Earth sphere
    const earthGeo=new THREE.SphereGeometry(1,64,64);
    const earthMat=new THREE.MeshPhongMaterial({
      color:0x0a1628,emissive:0x050a14,specular:0x111111,shininess:5,
      transparent:true,opacity:0.95
    });
    const earth=new THREE.Mesh(earthGeo,earthMat);
    scene.add(earth);

    // Wireframe grid
    const wireGeo=new THREE.SphereGeometry(1.002,36,18);
    const wireMat=new THREE.MeshBasicMaterial({color:0x1a2332,wireframe:true,transparent:true,opacity:0.3});
    scene.add(new THREE.Mesh(wireGeo,wireMat));

    // Atmosphere glow
    const glowGeo=new THREE.SphereGeometry(1.08,32,32);
    const glowMat=new THREE.MeshBasicMaterial({color:0x58a6ff,transparent:true,opacity:0.05,side:THREE.BackSide});
    scene.add(new THREE.Mesh(glowGeo,glowMat));

    // Continents as line segments
    const contMat=new THREE.LineBasicMaterial({color:0x30404d});
    Object.values(CONTINENTS).forEach(pts=>{
      const positions=[];
      pts.forEach(([lon,lat])=>{
        const φ=toRad(lat),λ=toRad(lon),r=1.003;
        positions.push(r*Math.cos(φ)*Math.cos(λ),r*Math.sin(φ),r*Math.cos(φ)*Math.sin(-λ));
      });
      const geo=new THREE.BufferGeometry();
      geo.setAttribute("position",new THREE.Float32BufferAttribute(positions,3));
      scene.add(new THREE.Line(geo,contMat));
    });

    // Lights
    const ambient=new THREE.AmbientLight(0x404040,0.6);scene.add(ambient);
    const sun=solarSubPoint();
    const sunDir=new THREE.Vector3(
      Math.cos(toRad(sun.lat))*Math.cos(toRad(sun.lon)),
      Math.sin(toRad(sun.lat)),
      Math.cos(toRad(sun.lat))*Math.sin(-toRad(sun.lon))
    ).multiplyScalar(5);
    const dirLight=new THREE.DirectionalLight(0xfff4e0,0.8);
    dirLight.position.copy(sunDir);scene.add(dirLight);

    // TX marker
    if(txPos){
      const φ=toRad(txPos.lat),λ=toRad(txPos.lon),r=1.01;
      const pos=new THREE.Vector3(r*Math.cos(φ)*Math.cos(λ),r*Math.sin(φ),r*Math.cos(φ)*Math.sin(-λ));
      const markerGeo=new THREE.SphereGeometry(0.02,8,8);
      const markerMat=new THREE.MeshBasicMaterial({color:0xf85149});
      const marker=new THREE.Mesh(markerGeo,markerMat);
      marker.position.copy(pos);scene.add(marker);
      // Glow
      const glowG=new THREE.SphereGeometry(0.04,8,8);
      const glowM=new THREE.MeshBasicMaterial({color:0xf85149,transparent:true,opacity:0.25});
      const glow=new THREE.Mesh(glowG,glowM);glow.position.copy(pos);scene.add(glow);
    }

    // RX marker
    if(rxPos){
      const φ=toRad(rxPos.lat),λ=toRad(rxPos.lon),r=1.01;
      const pos=new THREE.Vector3(r*Math.cos(φ)*Math.cos(λ),r*Math.sin(φ),r*Math.cos(φ)*Math.sin(-λ));
      const mg=new THREE.SphereGeometry(0.02,8,8);
      const mm=new THREE.MeshBasicMaterial({color:0x3fb950});
      const m=new THREE.Mesh(mg,mm);m.position.copy(pos);scene.add(m);
      const gg=new THREE.SphereGeometry(0.04,8,8);
      const gm=new THREE.MeshBasicMaterial({color:0x3fb950,transparent:true,opacity:0.25});
      const g2=new THREE.Mesh(gg,gm);g2.position.copy(pos);scene.add(g2);
    }

    // Great circle path on globe
    if(txPos&&rxPos){
      const pts=greatCirclePoints(txPos.lat,txPos.lon,rxPos.lat,rxPos.lon,100);
      const positions=[];
      pts.forEach(([lat,lon])=>{
        const φ=toRad(lat),λ=toRad(lon),r=1.005;
        positions.push(r*Math.cos(φ)*Math.cos(λ),r*Math.sin(φ),r*Math.cos(φ)*Math.sin(-λ));
      });
      const geo=new THREE.BufferGeometry();
      geo.setAttribute("position",new THREE.Float32BufferAttribute(positions,3));
      const mat=new THREE.LineBasicMaterial({color:0x58a6ff,linewidth:2});
      scene.add(new THREE.Line(geo,mat));
    }

    // Heatmap dots on globe
    if(txPos && !rxPos){
      const band = BANDS.find(b=>b.name===stationConfig.band)||BANDS[4];
      const mode = MODES.find(m=>m.name===stationConfig.mode)||MODES[0];
      for(let lat=-80;lat<=80;lat+=8){
        for(let lon=-180;lon<180;lon+=8){
          const dist=greatCircleDist(txPos.lat,txPos.lon,lat,lon);
          if(dist<300||dist>18000)continue;
          const result=calcPropagation({
            txLat:txPos.lat,txLon:txPos.lon,rxLat:lat,rxLon:lon,
            freqMHz:band.freq,powerW:stationConfig.power,
            txGain:ANTENNA_TYPES[stationConfig.antennaIdx].gain,
            rxGain:2.15,sfi:solar.sfi,kIndex:solar.kIndex,mode
          });
          if(result.probability>0.1){
            const p=result.probability;
            const φ=toRad(lat),λ=toRad(lon),r=1.004;
            const pos=new THREE.Vector3(r*Math.cos(φ)*Math.cos(λ),r*Math.sin(φ),r*Math.cos(φ)*Math.sin(-λ));
            const c=p>0.6?0x3fb950:p>0.3?0xd29922:0xf85149;
            const dg=new THREE.SphereGeometry(0.008+p*0.012,6,6);
            const dm=new THREE.MeshBasicMaterial({color:c,transparent:true,opacity:0.3+p*0.4});
            const dot=new THREE.Mesh(dg,dm);dot.position.copy(pos);scene.add(dot);
          }
        }
      }
    }

    // Mouse rotation
    let isDragging=false,prevMouse={x:0,y:0};
    let rotX=-0.3,rotY=0;
    const onDown=(e)=>{isDragging=true;prevMouse={x:e.clientX,y:e.clientY}};
    const onMove=(e)=>{
      if(!isDragging)return;
      const dx=e.clientX-prevMouse.x,dy=e.clientY-prevMouse.y;
      rotY+=dx*0.005;rotX-=dy*0.005;
      rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
      prevMouse={x:e.clientX,y:e.clientY};
    };
    const onUp=()=>{isDragging=false};
    renderer.domElement.addEventListener("mousedown",onDown);
    renderer.domElement.addEventListener("mousemove",onMove);
    renderer.domElement.addEventListener("mouseup",onUp);
    renderer.domElement.addEventListener("mouseleave",onUp);
    // Touch
    renderer.domElement.addEventListener("touchstart",(e)=>{isDragging=true;prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY}});
    renderer.domElement.addEventListener("touchmove",(e)=>{
      if(!isDragging)return;
      const dx=e.touches[0].clientX-prevMouse.x,dy=e.touches[0].clientY-prevMouse.y;
      rotY+=dx*0.005;rotX-=dy*0.005;
      rotX=Math.max(-Math.PI/2,Math.min(Math.PI/2,rotX));
      prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};
    });
    renderer.domElement.addEventListener("touchend",()=>{isDragging=false});

    let frame;
    const animate=()=>{
      frame=requestAnimationFrame(animate);
      if(!isDragging){rotY+=0.001}
      camera.position.set(3.2*Math.cos(rotX)*Math.sin(rotY),3.2*Math.sin(rotX),3.2*Math.cos(rotX)*Math.cos(rotY));
      camera.lookAt(0,0,0);
      renderer.render(scene,camera);
    };
    animate();
    sceneRef.current={scene,renderer,camera};

    return()=>{
      cancelAnimationFrame(frame);
      renderer.dispose();
      if(container.contains(renderer.domElement))container.removeChild(renderer.domElement);
    };
  },[txPos,rxPos,solar,stationConfig]);

  return React.createElement("div",{ref:mountRef,className:"globe-container"});
}

// ─── MUF MAP (for each band, show global MUF contours) ──
function MUFChart({solar}){
  const canvasRef=useRef(null);
  useEffect(()=>{
    const c=canvasRef.current;if(!c)return;
    const ctx=c.getContext("2d");
    const w=300,h=40;
    const dpr=window.devicePixelRatio||1;
    c.width=w*dpr;c.height=h*dpr;
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,w,h);
    // Draw MUF vs distance
    const sun=solarSubPoint();
    ctx.beginPath();
    for(let d=500;d<=20000;d+=200){
      const muf=estimateMUF(solar.sfi,solar.kIndex,d,false,0);
      const x=(d/20000)*w;
      const y=h-(muf/50)*h;
      d===500?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle="#d29922";ctx.lineWidth=1.5;ctx.stroke();
    // Night MUF
    ctx.beginPath();
    for(let d=500;d<=20000;d+=200){
      const muf=estimateMUF(solar.sfi,solar.kIndex,d,true,0);
      const x=(d/20000)*w;
      const y=h-(muf/50)*h;
      d===500?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.strokeStyle="#58a6ff";ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
    // Labels
    ctx.fillStyle="#484f58";ctx.font="8px monospace";
    ctx.fillText("500km",2,h-2);ctx.fillText("20000km",w-45,h-2);
    ctx.fillText("50MHz",2,8);
  },[solar]);

  return React.createElement("div",{className:"sparkline-box"},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:4}},
      React.createElement("span",{style:{fontSize:9,color:"#8b949e",fontWeight:700,letterSpacing:"0.8px"}},"MUF vs DISTANCE"),
      React.createElement("div",{style:{display:"flex",gap:8,fontSize:9}},
        React.createElement("span",{style:{color:"#d29922"}},"— Day"),
        React.createElement("span",{style:{color:"#58a6ff"}},"-- Night"))),
    React.createElement("canvas",{ref:canvasRef,style:{width:300,height:40,display:"block",width:"100%"}}),
  );
}

function App(){
  const [solar,setSolar]=useState(DEFAULT_SOLAR);

    power:100,band:"20m",mode:"FT8",antennaIdx:0
  });

  // Clock
  useEffect(()=>{
    const tick=()=>{
      const now=new Date();
      setUtcTime(now.toISOString().slice(11,19));
    };
    tick();const t=setInterval(tick,1000);return()=>clearInterval(t);
  },[]);

  // Fetch solar data
  useEffect(()=>{
    let mounted=true;
    const fetchSolar=async()=>{
      try{
        const urls=[
          "https://www.hamqsl.com/solarxml.php",
        ];
        let data=null;
        for(const url of urls){
          try{
            const r=await fetch(url,{mode:"cors",signal:AbortSignal.timeout(5000)});
            if(r.ok){const txt=await r.text();data=parseSolarXML(txt);break;}
          }catch(e){continue;}
        }
        if(data&&mounted){
          setSolar(prev=>({
            ...data,
            sfiHistory:[...prev.sfiHistory.slice(-29),data.sfi],
            kHistory:[...prev.kHistory.slice(-29),data.kIndex],
          }));
        }else{
          // Use simulated data with drift
          setSolar(prev=>{
            const sfi=DEFAULT_SOLAR.sfi+Math.round((Math.random()-0.5)*6);
            const kIndex=Math.max(0,Math.min(9,DEFAULT_SOLAR.kIndex+Math.round((Math.random()-0.5)*1.5)));
            return{
              ...DEFAULT_SOLAR,sfi,kIndex,
              sn:DEFAULT_SOLAR.sn+Math.round((Math.random()-0.5)*10),
              bz:parseFloat((DEFAULT_SOLAR.bz+(Math.random()-0.5)*3).toFixed(1)),
              solarWind:Math.round(DEFAULT_SOLAR.solarWind+(Math.random()-0.5)*40),
              sfiHistory:[...prev.sfiHistory.slice(-29),sfi],
              kHistory:[...prev.kHistory.slice(-29),kIndex],
              source:"SIMULATED",
              updated:new Date().toISOString()
            };
          });
        }
      }catch(e){
        setSolar(prev=>({...prev,source:"SIMULATED"}));
      }
    };
    fetchSolar();
    const t=setInterval(fetchSolar,120000);
    return()=>{mounted=false;clearInterval(t)};
  },[]);

  return React.createElement("div",{style:{minHeight:"100vh"}},
    React.createElement(Header,{solar,utcTime}),
    React.createElement("div",{style:{maxWidth:1400,margin:"0 auto",padding:"12px 16px"}},

        React.createElement(BandConditions,{solar}),
      ),
      // MUF Chart
      React.createElement(MUFChart,{solar}),
      // Station config
      React.createElement(StationConfig,{config:stationConfig,setConfig:setStationConfig,
        txPos,rxPos,setTxPos,setRxPos,mapMode,setMapMode}),
      // Map tabs
      React.createElement("div",{style:{marginBottom:12}},
        React.createElement("div",{className:"tab-bar",style:{display:"inline-flex",marginBottom:12}},
          React.createElement("button",{className:`tab-btn ${viewTab==="map2d"?"active":""}`,onClick:()=>setViewTab("map2d")},"2D MAP"),
          React.createElement("button",{className:`tab-btn ${viewTab==="globe"?"active":""}`,onClick:()=>setViewTab("globe")},"3D GLOBE"),
        ),
        viewTab==="map2d"&&React.createElement(Map2D,{txPos,rxPos,setTxPos,setRxPos,solar,mapMode,stationConfig}),
        viewTab==="globe"&&React.createElement(Globe3D,{txPos,rxPos,solar,stationConfig}),
      ),
      // Contact results
      React.createElement("div",{className:"console-card"},
        React.createElement("div",{className:"console-header"},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},
            React.createElement("span",{style:{color:"#f0883e",fontSize:14}},"⬡"),
            React.createElement("span",{style:{color:"#c9d1d9",fontWeight:700,fontSize:13}},"CONTACT PREDICTION")),
          React.createElement("span",{className:"console-tag",style:{color:"#f0883e",border:"1px solid #f0883e44",background:"#f0883e11"}},"PREDICT"),

}
