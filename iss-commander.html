<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ISS Commander — Mission Control</title>
<meta name="description" content="Real-time ISS mission control dashboard organized by flight console (TOPO, ETHOS, SPARTAN, ADCO, VVO, CATO, ROBO, ODIN, EVA, CAPCOM). 200+ telemetry points.">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#0d1117}
  ::-webkit-scrollbar-thumb{background:#21262d;border-radius:4px}
  ::-webkit-scrollbar-thumb:hover{background:#30363d}
  html,body{
    background:#0d1117;
    font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
    color:#c9d1d9;
    min-height:100vh;
    font-size:13px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    -moz-osx-font-smoothing:grayscale;
  }
  body{overflow-x:hidden}
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  @keyframes dot{0%,100%{opacity:1}50%{opacity:.3}}
  @keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
  #root{min-height:100vh}
  .btn{cursor:pointer;font-family:inherit;transition:background .15s,border-color .15s,color .15s}
  .caret{display:inline-block;width:8px;height:14px;background:#58a6ff;animation:blink 1.1s infinite;vertical-align:middle;margin-left:2px}
  a{color:#58a6ff;text-decoration:none}
  a:hover{text-decoration:underline}
  .console-card{
    border:1px solid #21262d;
    background:#0f141a;
    border-radius:6px;
    padding:14px 16px;
    margin-bottom:12px;
    transition:border-color .2s;
  }
  .console-card:hover{border-color:#30363d}
  .console-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:10px;
    padding-bottom:8px;
    border-bottom:1px solid #21262d;
  }
  .console-tag{
    font-size:10px;
    font-weight:700;
    letter-spacing:1.5px;
    padding:2px 7px;
    border-radius:3px;
    text-transform:uppercase;
  }
  .progress-track{height:4px;background:#21262d;border-radius:2px;overflow:hidden;margin-top:4px}
  .progress-fill{height:100%;border-radius:2px;transition:width .5s ease-out}
  .tm-row{display:flex;justify-content:space-between;align-items:center;padding:4px 6px;font-size:10px;border-bottom:1px dotted #21262d}
  .tm-row:last-child{border-bottom:none}
  .tm-label{color:#8b949e;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:8px}
  .tm-val{color:#c9d1d9;font-weight:600;font-variant-numeric:tabular-nums;white-space:nowrap}
  .tm-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:6px;margin-top:6px}
  .tm-group{background:#0a0e13;border:1px solid #21262d;border-radius:4px;padding:8px}
  .tm-group-title{font-size:9px;color:#8b949e;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;padding-bottom:6px;margin-bottom:4px;border-bottom:1px solid #21262d}
  .sparkline-box{background:#0a0e13;border:1px solid #21262d;border-radius:4px;padding:8px 10px;margin-bottom:8px}
  .subcard{background:#0a0e13;border:1px solid #21262d;border-radius:4px;padding:8px 10px;margin-bottom:6px}
  details{cursor:pointer}
  summary{list-style:none;outline:none}
  summary::-webkit-details-marker{display:none}

  /* ─── COCKPIT ENRICHMENTS ───────────────────────────── */
  .cockpit-frame{
    background:linear-gradient(180deg,#0f141a 0%,#0d1117 100%);
    box-shadow:inset 0 1px 0 #ffffff05, 0 1px 2px #00000040;
  }
  .led-dot{
    display:inline-block;
    width:7px;height:7px;
    border-radius:50%;
    animation:dot 1.8s infinite;
    flex-shrink:0;
  }
  .digital-readout{
    font-family:"SF Mono",Menlo,Consolas,monospace;
    letter-spacing:0.5px;
  }
  .console-card{position:relative;}
  .tm-group{position:relative;}
  .sparkline-box{
    background:linear-gradient(180deg,#0a0e13 0%,#080b10 100%);
  }
  .tm-row:hover{background:#161b22;}
  /* Canadian-style ON/ACTIVE badges */
  .on-badge{
    display:inline-block;
    padding:2px 7px;
    font-size:9px;
    font-weight:700;
    letter-spacing:1px;
    color:#3fb950;
    border:1px solid #3fb95066;
    border-radius:3px;
    background:#3fb95011;
    text-shadow:0 0 6px #3fb95088;
  }
  .off-badge{
    display:inline-block;
    padding:2px 7px;
    font-size:9px;
    font-weight:700;
    letter-spacing:1px;
    color:#6e7681;
    border:1px solid #30363d;
    border-radius:3px;
    background:#0a0e13;
  }
  .active-badge{
    display:inline-block;
    padding:2px 7px;
    font-size:9px;
    font-weight:700;
    letter-spacing:1px;
    color:#58a6ff;
    border:1px solid #58a6ff66;
    border-radius:3px;
    background:#58a6ff11;
    text-shadow:0 0 6px #58a6ff88;
  }
</style>

function simulateOrbit(t, inc, perMin, phase) {
  phase = phase || 0;
  var perMs = perMin*60*1000;
  var frac = ((t+phase)%perMs)/perMs;
  var rawLon = (frac*360+180)%360 - 180;
  var earthRot = ((t/60000)*0.25)%360;
  var lon = ((rawLon - earthRot + 540) % 360) - 180;
  var lat = inc * Math.sin(frac*2*Math.PI);
  return {latitude:lat, longitude:lon};
}

function StationCommander() {
  const [iss, setIss] = useState(null);
  const [time, setTime] = useState(Date.now());
  const [issTrail, setIssTrail] = useState([]);
  const [apiStatus, setApiStatus] = useState("connecting");
  const [telemetry, setTelemetry] = useState({});
  const [history, setHistory] = useState({});
  const [lsStatus, setLsStatus] = useState("connecting");

  // ─── ISS POSITION ──────────────────────────────────────────────────
  const fetchISS = useCallback(function(){
    fetch("https://api.wheretheiss.at/v1/satellites/25544")
      .then(function(r){if(!r.ok)throw new Error();return r.json();})
      .then(function(d){
        setIss(Object.assign({},d,{live:true}));
        setApiStatus("online");
        setIssTrail(function(p){return p.slice(-300).concat([{lat:d.latitude,lon:d.longitude,t:Date.now()}]);});
      })
      .catch(function(){
        setApiStatus("offline");
        var s=simulateOrbit(Date.now(),51.64,92.68,0);
        var d={latitude:s.latitude,longitude:s.longitude,altitude:418+Math.random()*5,velocity:27580+Math.random()*40,visibility:Math.random()>0.4?"daylight":"eclipsed",live:false};
        setIss(d);
        setIssTrail(function(p){return p.slice(-300).concat([{lat:d.latitude,lon:d.longitude,t:Date.now()}]);});
      });
  },[]);

  // ─── LIGHTSTREAMER ──────────────────────────────────────────────────
  useEffect(function(){
    let client, sub;
    let retries = 0;

    // Resolve LightstreamerClient/Subscription constructors from any of the possible namespaces.
    // Lightstreamer Web Client SDK 9.2+ exposes these as DIRECT GLOBALS on window
    // (window.LightstreamerClient, window.Subscription).
    // Older 9.0/9.1 versions exposed them under the "Ls" namespace (Ls.LightstreamerClient).
    // Some builds also use "lightstreamer" lowercase. We try all three so the code is robust.
    function resolveLs(){
      // Direct globals (current SDK 9.2+)
      if(typeof window.LightstreamerClient === "function" && typeof window.Subscription === "function"){
        return { LightstreamerClient: window.LightstreamerClient, Subscription: window.Subscription, source: "global" };
      }
      // Ls namespace (older 9.0/9.1)
      if(window.Ls && typeof window.Ls.LightstreamerClient === "function"){
        return { LightstreamerClient: window.Ls.LightstreamerClient, Subscription: window.Ls.Subscription, source: "Ls" };
      }
      // lightstreamer namespace (some builds)
      if(window.lightstreamer && typeof window.lightstreamer.LightstreamerClient === "function"){
        return { LightstreamerClient: window.lightstreamer.LightstreamerClient, Subscription: window.lightstreamer.Subscription, source: "lightstreamer" };
      }
      return null;
    }

    function tryConnect(){
      const ns = resolveLs();
      if(!ns){
        retries++;
        if(retries < 60){
          setTimeout(tryConnect, 250);
        } else {
          console.warn("[LS] library not loaded after 60 retries — check that the unpkg CDN is reachable");
          setLsStatus("library-missing");
        }
        return;
      }
      try {
        console.log("[LS] Library loaded from namespace:", ns.source);
        console.log("[LS] Connecting to push.lightstreamer.com / ISSLIVE ...");
        client = new ns.LightstreamerClient("https://push.lightstreamer.com","ISSLIVE");
        client.addListener({
          onStatusChange: function(status){
            console.log("[LS] status:", status);
            if(status.indexOf("CONNECTED") === 0) setLsStatus("online");
            else if(status.indexOf("DISCONNECTED") === 0) setLsStatus("offline");
            else if(status.indexOf("STALLED") === 0) setLsStatus("stalled");
            else setLsStatus("connecting");
          },
          onServerError: function(code, msg){
            console.error("[LS] server error:", code, msg);
            setLsStatus("error");
          }
        });
        client.connect();
        const symbols = Object.keys(TELEMETRY);
        console.log("[LS] Subscribing to", symbols.length, "symbols");

        sub.setRequestedSnapshot("yes");
        sub.setRequestedMaxFrequency("1.0");
        sub.addListener({
          onSubscription: function(){ console.log("[LS] ✓ subscribed OK"); },
          onSubscriptionError: function(code, msg){ console.error("[LS] sub error:", code, msg); },
          onItemUpdate: function(update){
            const itemName = update.getItemName();
            const value = update.getValue("Value");
            const ts = update.getValue("TimeStamp");
            if(value === null || value === undefined) return;
            setTelemetry(function(prev){ return Object.assign({},prev,{[itemName]:{value:value,ts:ts}}); });
            if(TELEMETRY[itemName] && TELEMETRY[itemName].chart){
              const numV = parseFloat(value);
              if(!isNaN(numV)){
                setHistory(function(prev){
                  const arr = (prev[itemName] || []).concat([{t:Date.now(), v:numV}]);
                  return Object.assign({}, prev, {[itemName]: arr.slice(-60)});
                });
              }
            }
          }
        });
        client.subscribe(sub);
      } catch(e) {
        console.error("[LS] init error:",e);
        setLsStatus("error");
      }
    }
    tryConnect();
    return function(){ try { if(client) client.disconnect(); } catch(e){} };

          next[sym] = arr.slice(-60);
        });
        return next;
      });

function Row({sym, tm, tmNum}){
  const meta = TELEMETRY[sym];
  if(!meta) return null;
  const raw = tm(sym);
  let display = raw;
  if(raw !== "---" && !isNaN(parseFloat(raw))){
    const n = parseFloat(raw);
    display = Math.abs(n) >= 10000 ? n.toFixed(0) : Math.abs(n) >= 100 ? n.toFixed(1) : Math.abs(n) >= 10 ? n.toFixed(2) : n.toFixed(3);
  }
  return (
    <div className="tm-row">
      <span style={{display:"inline-block",width:4,height:4,borderRadius:"50%",background:"#3fb95066",marginRight:5,verticalAlign:"middle"}}/>
      <span className="tm-label" title={sym}>{meta.label}</span>
      <span className="tm-val">{display} <span style={{color:"#6e7681",fontSize:9}}>{meta.unit}</span></span>
    </div>
  );
}

function KV({l,v}){

// Sparkline: mini SVG time-series chart with multiple visual variants
function Sparkline({title, data, color, unit, variant}){
  variant = variant || "area";
  const points = (data || []).filter(function(p){return !isNaN(p.v);});
  const hasData = points.length >= 2;

  let latest = "---";
  let minV = 0, maxV = 0;

  const w = 260, h = 36;
  let renderedChart = null;

  if(hasData){
    const vs = points.map(function(p){return p.v;});
    minV = Math.min.apply(null, vs);
    maxV = Math.max.apply(null, vs);
    const range = (maxV - minV) || 1;
    const step = w / (points.length - 1);

    latest = points[points.length-1].v;
    if(Math.abs(latest) >= 100) latest = latest.toFixed(0);
    else if(Math.abs(latest) >= 10) latest = latest.toFixed(1);
    else latest = latest.toFixed(2);

    // Compute Y pixel for each point
    const xy = points.map(function(p,i){
      return {
        x: i*step,
        y: h - ((p.v - minV)/range) * h
      };
    });

    if(variant === "area"){
      // Line + gradient area under
      const path = xy.map(function(p,i){return (i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");
      const areaPath = path + " L"+w+","+h+" L0,"+h+" Z";
      const id = "grad-area-"+title.replace(/[^a-z0-9]/gi,"")+"-"+color.replace("#","");
      renderedChart = (
        <g>
          <defs>
            <linearGradient id={id} x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor={color} stopOpacity="0.4"/>
              <stop offset="100%" stopColor={color} stopOpacity="0"/>
            </linearGradient>
          </defs>
          <path d={areaPath} fill={"url(#"+id+")"}/>
          <path d={path} stroke={color} strokeWidth="1.5" fill="none" filter={"drop-shadow(0 0 2px "+color+"88)"}/>
          <circle cx={xy[xy.length-1].x} cy={xy[xy.length-1].y} r="2.5" fill={color}>
            <animate attributeName="r" values="2;3.5;2" dur="1.8s" repeatCount="indefinite"/>
          </circle>
        </g>
      );
    } else if(variant === "bars"){
      // Vertical bars - waveform style like "ALT (24h)"
      const barW = Math.max(1, step*0.6);
      renderedChart = (
        <g>
          {xy.map(function(p,i){
            const barH = h - p.y;
            return (
              <rect key={i}
                x={p.x - barW/2}
                y={p.y}
                width={barW}
                height={Math.max(0.5, barH)}
                fill={color}
                opacity={0.5 + (i/xy.length)*0.5}
              />
            );
          })}
        </g>
      );
    } else if(variant === "dots"){
      // Scatter + thin connecting line
      const path = xy.map(function(p,i){return (i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");
      renderedChart = (
        <g>
          <path d={path} stroke={color} strokeWidth="0.8" fill="none" opacity="0.4"/>
          {xy.map(function(p,i){
            const isLast = i === xy.length-1;
            return <circle key={i} cx={p.x} cy={p.y} r={isLast?2.5:1.5} fill={color} opacity={isLast?1:(0.4+(i/xy.length)*0.5)}/>;
          })}
        </g>
      );
    } else if(variant === "filled"){
      // Thick solid area fill (no line on top) - like "SPD (24h)"
      const path = xy.map(function(p,i){return (i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");
      const areaPath = path + " L"+w+","+h+" L0,"+h+" Z";
      renderedChart = (
        <g>
          <path d={areaPath} fill={color} opacity="0.7"/>
          <path d={path} stroke={color} strokeWidth="1" fill="none" opacity="1"/>
        </g>
      );
    } else if(variant === "ramp"){
      // Thick line only - simple ramp style for slow-changing values like "β 24h"
      const path = xy.map(function(p,i){return (i===0?"M":"L")+p.x.toFixed(1)+","+p.y.toFixed(1);}).join(" ");
      renderedChart = (
        <g>
          <path d={path} stroke={color} strokeWidth="2.5" fill="none" strokeLinecap="round" strokeLinejoin="round" filter={"drop-shadow(0 0 3px "+color+")"}/>
        </g>
      );
    } else if(variant === "histogram"){
      // Histogram-style bars with baseline at mid
      const mid = h/2;
      const range2 = (maxV - minV) || 1;
      const midV = (maxV + minV)/2;
      renderedChart = (
        <g>
          <line x1="0" y1={mid} x2={w} y2={mid} stroke={color} strokeWidth="0.5" opacity="0.3"/>
          {xy.map(function(p,i){
            const delta = (points[i].v - midV);
            const bh = Math.abs(delta/range2 * h/2);
            const y = delta >= 0 ? mid - bh : mid;
            return <rect key={i} x={p.x-0.8} y={y} width="1.6" height={bh} fill={color} opacity={0.6+(i/xy.length)*0.4}/>;
          })}
        </g>
      );
    }
  }

  return (
    <div className="sparkline-box" style={{position:"relative"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
        <span style={{fontSize:9,color:"#8b949e",textTransform:"uppercase",letterSpacing:0.5,display:"flex",alignItems:"center",gap:4}}>
          <span style={{display:"inline-block",width:5,height:5,borderRadius:"50%",background:color,boxShadow:"0 0 4px "+color,animation:"dot 1.8s infinite"}}/>
          {title}
        </span>
        <span className="digital-readout" style={{fontSize:13,color:color,fontWeight:700,fontVariantNumeric:"tabular-nums",textShadow:"0 0 8px "+color+"66"}}>
          {latest} <span style={{color:"#6e7681",fontSize:9,textShadow:"none"}}>{unit}</span>
        </span>
      </div>
      <svg viewBox={"0 0 "+w+" "+h} style={{width:"100%",height:32,display:"block"}}>
        {[0.25,0.5,0.75].map(function(f){return (
          <line key={f} x1="0" y1={h*f} x2={w} y2={h*f} stroke="#21262d" strokeWidth="0.5" strokeDasharray="2,3"/>
        );})}
        {[0.25,0.5,0.75].map(function(f){return (
          <line key={"v"+f} x1={w*f} y1="0" x2={w*f} y2={h} stroke="#21262d" strokeWidth="0.5" strokeDasharray="2,3"/>
        );})}
        {hasData ? renderedChart : (
          <text x={w/2} y={h/2+4} fill="#6e7681" fontSize="9" textAnchor="middle" fontFamily="monospace">acquiring data...</text>
        )}
      </svg>
      {hasData && (
        <div style={{fontSize:8,color:"#6e7681",display:"flex",justifyContent:"space-between",marginTop:3,letterSpacing:0.5}}>
          <span>MIN {minV.toFixed(2)}</span>
          <span style={{color:"#3fb95088"}}>● {points.length} SMP</span>
          <span>MAX {maxV.toFixed(2)}</span>
        </div>
      )}
    </div>
  );
}

      badge: "OFFICIAL",
      embed: "https://www.youtube-nocookie.com/embed/live_stream?channel=UCLA_DiR1FfKNvjuUpBHmylQ&autoplay=1&mute=1&rel=0",

    spacevids: {
      name: "Space Videos",

      embed: "https://www.youtube-nocookie.com/embed/live_stream?channel=UCakgsb0w7QB0VHdNCFCrAWg&autoplay=1&mute=1&rel=0",

        </div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap",marginTop:6,paddingTop:6,borderTop:"1px dashed #21262d"}}>

// ─── SPACE CONDITIONS — NOAA SWPC real-time space weather ────────────
function SpaceConditions(){
  const [data, setData] = useState({
    kp: null,
    kpTime: null,
    solarWind: null,
    scales: null,
    f107: null,
    loaded: false,
    error: null
  });

  useEffect(function(){
    async function fetchAll(){
      const urls = {
        kp: "https://services.swpc.noaa.gov/products/noaa-planetary-k-index.json",
        wind: "https://services.swpc.noaa.gov/products/solar-wind/plasma-5-minute.json",
        mag: "https://services.swpc.noaa.gov/products/solar-wind/mag-5-minute.json",
        scales: "https://services.swpc.noaa.gov/products/noaa-scales.json",
        f107: "https://services.swpc.noaa.gov/products/10cm-flux-30-day.json"
      };
      try {
        const results = await Promise.allSettled(
          Object.values(urls).map(function(u){return fetch(u).then(function(r){return r.json();});})
        );
        const [kpR, windR, magR, scalesR, f107R] = results;
        const out = {loaded:true,error:null};
        // kp index - array of arrays, first row is header
        if(kpR.status === "fulfilled" && Array.isArray(kpR.value) && kpR.value.length > 1){
          const latest = kpR.value[kpR.value.length-1];
          out.kp = parseFloat(latest[1]);
          out.kpTime = latest[0];
          // Keep recent history for chart
          out.kpHistory = kpR.value.slice(1).slice(-24).map(function(r){return {t:r[0], v:parseFloat(r[1])};});
        }
        // solar wind plasma - [[time, density, speed, temperature], ...]
        if(windR.status === "fulfilled" && Array.isArray(windR.value) && windR.value.length > 1){
          const rows = windR.value.slice(1);
          const latest = rows[rows.length-1];
          out.solarWind = {
            density: parseFloat(latest[1]),
            speed: parseFloat(latest[2]),
            temperature: parseFloat(latest[3]),
            time: latest[0]
          };
        }
        // magnetometer - [[time, bx, by, bz, lon, lat, bt], ...]
        if(magR.status === "fulfilled" && Array.isArray(magR.value) && magR.value.length > 1){
          const rows = magR.value.slice(1);
          const latest = rows[rows.length-1];
          out.mag = {
            bt: parseFloat(latest[6]),
            bz: parseFloat(latest[3]),
            time: latest[0]
          };
        }
        // NOAA scales (R/S/G)
        if(scalesR.status === "fulfilled" && scalesR.value){
          out.scales = scalesR.value;
        }
        // F10.7 flux
        if(f107R.status === "fulfilled" && Array.isArray(f107R.value) && f107R.value.length > 0){
          const latest = f107R.value[f107R.value.length-1];
          out.f107 = parseFloat(latest.flux || latest.observed_flux || latest.f107);
        }
        setData(out);
      } catch(e) {
        console.error("[SpaceWx] fetch error:", e);
        setData(function(d){return Object.assign({},d,{loaded:true,error:e.message});});
      }
    }
    fetchAll();
    const i = setInterval(fetchAll, 300000); // 5 min
    return function(){clearInterval(i);};
  },[]);

  // Helper: get severity level color for Kp
  function kpColor(kp){
    if(kp === null || kp === undefined) return "#8b949e";
    if(kp < 4) return "#3fb950";    // quiet
    if(kp < 5) return "#d29922";    // unsettled
    if(kp < 6) return "#f0883e";    // minor storm
    if(kp < 7) return "#f85149";    // moderate
    return "#ff5370";               // severe
  }
  function kpLabel(kp){
    if(kp === null || kp === undefined) return "---";
    if(kp < 4) return "QUIET";
    if(kp < 5) return "UNSETTLED";
    if(kp < 6) return "G1 MINOR";
    if(kp < 7) return "G2 MOD";
    if(kp < 8) return "G3 STRONG";
    if(kp < 9) return "G4 SEVERE";
    return "G5 EXTREME";
  }
  // NOAA R-scale (radio blackout) label
  const nowScales = data.scales && data.scales[0];
  const rScale = nowScales ? (nowScales.R ? nowScales.R.Scale : "0") : "---";
  const sScale = nowScales ? (nowScales.S ? nowScales.S.Scale : "0") : "---";
  const gScale = nowScales ? (nowScales.G ? nowScales.G.Scale : "0") : "---";

  function scaleColor(s){
    if(s === "---") return "#8b949e";
    const n = parseInt(s, 10) || 0;
    if(n === 0) return "#3fb950";
    if(n === 1) return "#d29922";
    if(n === 2) return "#f0883e";
    if(n === 3) return "#f85149";
    return "#ff5370";
  }
  function scaleLabel(s, letter){
    const labels = {
      "R": ["NO BLACKOUT","R1 MINOR","R2 MODERATE","R3 STRONG","R4 SEVERE","R5 EXTREME"],
      "S": ["NO STORM","S1 MINOR","S2 MODERATE","S3 STRONG","S4 SEVERE","S5 EXTREME"],
      "G": ["NO STORM","G1 MINOR","G2 MODERATE","G3 STRONG","G4 SEVERE","G5 EXTREME"]
    };
    const n = parseInt(s, 10) || 0;
    return labels[letter][n] || "---";
  }

  return (
    <div className="console-card cockpit-frame" style={{position:"relative",borderLeft:"3px solid #f0883e"}}>
      <div className="console-header">
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span className="led-dot" style={{background:"#f0883e",boxShadow:"0 0 6px #f0883e"}}/>
          <span style={{color:"#f0883e",fontSize:14}}>☀</span>
          <span className="console-tag" style={{color:"#f0883e",background:"#f0883e15",border:"1px solid #f0883e33"}}>SPACE WX</span>
          <span style={{color:"#8b949e",fontSize:11}}>Space weather & radiation environment · NOAA SWPC real-time</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:6,fontSize:9,color:"#6e7681"}}>
          <span className="on-badge">{data.loaded && !data.error ? "● LIVE" : "○ WAIT"}</span>
          <span style={{letterSpacing:0.5}}>SWPC</span>
        </div>
      </div>

      <div style={{fontSize:10,color:"#8b949e",marginBottom:10}}>
        NOAA Space Weather Prediction Center · Updated every 5 minutes · Important for EVA planning, radio comms, and astronaut radiation exposure
      </div>

      {/* NOAA Scales R/S/G */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:6,marginBottom:10}}>
        <div className="subcard" style={{borderLeft:"3px solid "+scaleColor(rScale)}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
            <div style={{color:"#f0883e",fontWeight:700,fontSize:10}}>R-SCALE</div>
            <span style={{fontSize:9,padding:"2px 6px",border:"1px solid "+scaleColor(rScale)+"66",color:scaleColor(rScale),borderRadius:3,fontWeight:700,letterSpacing:0.8,textShadow:"0 0 6px "+scaleColor(rScale)+"88"}}>{scaleLabel(rScale,"R")}</span>
          </div>
          <div style={{color:"#8b949e",fontSize:9}}>Radio Blackouts</div>
          <div style={{color:"#8b949e",fontSize:9}}>HF comms &amp; GPS</div>
          <div className="digital-readout" style={{color:scaleColor(rScale),fontSize:18,marginTop:3,textShadow:"0 0 10px "+scaleColor(rScale)+"66"}}>R {rScale}</div>
        </div>
        <div className="subcard" style={{borderLeft:"3px solid "+scaleColor(sScale)}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
            <div style={{color:"#f0883e",fontWeight:700,fontSize:10}}>S-SCALE</div>
            <span style={{fontSize:9,padding:"2px 6px",border:"1px solid "+scaleColor(sScale)+"66",color:scaleColor(sScale),borderRadius:3,fontWeight:700,letterSpacing:0.8,textShadow:"0 0 6px "+scaleColor(sScale)+"88"}}>{scaleLabel(sScale,"S")}</span>
          </div>
          <div style={{color:"#8b949e",fontSize:9}}>Solar Radiation</div>
          <div style={{color:"#8b949e",fontSize:9}}>Proton flux (EVA risk)</div>
          <div className="digital-readout" style={{color:scaleColor(sScale),fontSize:18,marginTop:3,textShadow:"0 0 10px "+scaleColor(sScale)+"66"}}>S {sScale}</div>
        </div>
        <div className="subcard" style={{borderLeft:"3px solid "+scaleColor(gScale)}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
            <div style={{color:"#f0883e",fontWeight:700,fontSize:10}}>G-SCALE</div>
            <span style={{fontSize:9,padding:"2px 6px",border:"1px solid "+scaleColor(gScale)+"66",color:scaleColor(gScale),borderRadius:3,fontWeight:700,letterSpacing:0.8,textShadow:"0 0 6px "+scaleColor(gScale)+"88"}}>{scaleLabel(gScale,"G")}</span>
          </div>
          <div style={{color:"#8b949e",fontSize:9}}>Geomagnetic Storms</div>
          <div style={{color:"#8b949e",fontSize:9}}>Aurora &amp; drag</div>
          <div className="digital-readout" style={{color:scaleColor(gScale),fontSize:18,marginTop:3,textShadow:"0 0 10px "+scaleColor(gScale)+"66"}}>G {gScale}</div>
        </div>
      </div>

      {/* Kp Index, Solar Wind, Magnetic Field, F10.7 */}
      <div className="tm-grid">
        <TmGroup title="Planetary Kp Index">
          <KV l="Current Kp" v={data.kp !== null ? <span style={{color:kpColor(data.kp),fontWeight:700,textShadow:"0 0 6px "+kpColor(data.kp)+"66"}}>{data.kp.toFixed(2)}</span> : "---"}/>
          <KV l="Condition" v={<span style={{color:kpColor(data.kp)}}>{kpLabel(data.kp)}</span>}/>
          <KV l="Last update" v={data.kpTime ? data.kpTime.slice(5,16) : "---"}/>
          <KV l="Impact" v={data.kp !== null && data.kp >= 5 ? "⚠ AURORA VISIBLE" : "nominal"}/>
        </TmGroup>
        <TmGroup title="Solar Wind (DSCOVR)">
          <KV l="Speed" v={data.solarWind ? data.solarWind.speed.toFixed(0) + " km/s" : "---"}/>
          <KV l="Density" v={data.solarWind ? data.solarWind.density.toFixed(1) + " p/cm³" : "---"}/>
          <KV l="Temp" v={data.solarWind ? (data.solarWind.temperature/1000).toFixed(0) + "K K" : "---"}/>
          <KV l="L1 point" v="1.5M km sunward"/>
        </TmGroup>
        <TmGroup title="Interplanetary Magnetic Field">
          <KV l="Bt (total)" v={data.mag ? data.mag.bt.toFixed(1) + " nT" : "---"}/>
          <KV l="Bz" v={data.mag ? <span style={{color:data.mag.bz < 0 ? "#f85149" : "#3fb950"}}>{data.mag.bz.toFixed(1) + " nT"}</span> : "---"}/>
          <KV l="Bz orientation" v={data.mag ? (data.mag.bz < 0 ? "south ⚠" : "north ✓") : "---"}/>
          <KV l="Coupling" v={data.mag ? (data.mag.bz < -5 ? "strong" : "weak") : "---"}/>
        </TmGroup>
        <TmGroup title="Solar Activity">
          <KV l="F10.7 flux" v={data.f107 ? data.f107.toFixed(0) + " sfu" : "---"}/>
          <KV l="Solar cycle" v="SC25 (declining)"/>
          <KV l="Activity level" v={data.f107 ? (data.f107 > 150 ? "high" : data.f107 > 100 ? "moderate" : "low") : "---"}/>
          <KV l="X-ray class" v={nowScales && nowScales.R ? (nowScales.R.Scale >= "1" ? "M+ class" : "< M1.0") : "< M1.0"}/>
        </TmGroup>
      </div>

      {/* EVA / Crew radiation risk summary */}
      <div style={{marginTop:10,padding:"8px 12px",background:"#0a0e13",border:"1px solid #21262d",borderRadius:3,fontSize:9,color:"#8b949e"}}>
        <div style={{display:"flex",flexWrap:"wrap",gap:14,alignItems:"center"}}>
          <span style={{color:"#f0883e",fontWeight:700,letterSpacing:0.5}}>▸ CREW RADIATION:</span>
          <span>Nominal SAA passes: <span style={{color:"#c9d1d9"}}>~6/day</span></span>
          <span>·</span>
          <span>EVA go/no-go: <span style={{color:parseInt(sScale,10) >= 2 ? "#f85149" : "#3fb950",fontWeight:700}}>{parseInt(sScale,10) >= 2 ? "NO-GO (S{sScale})" : "GO (nominal)"}</span></span>
          <span>·</span>
          <span>HF radio impact: <span style={{color:scaleColor(rScale),fontWeight:700}}>{scaleLabel(rScale,"R")}</span></span>
        </div>
        <div style={{marginTop:6,paddingTop:6,borderTop:"1px dashed #21262d",fontSize:8,color:"#6e7681"}}>
          Source: <a href="https://www.swpc.noaa.gov/" target="_blank" rel="noopener">NOAA Space Weather Prediction Center</a> · Kp via planetary-k-index · Solar wind via DSCOVR L1 · Scales via noaa-scales · F10.7 via Penticton observatory {data.error && <span style={{color:"#f85149",marginLeft:8}}>⚠ {data.error}</span>}
        </div>
      </div>
    </div>
  );
}

            <text x="400" y="267" fill="#c9d1d9" fontSize="9" textAnchor="middle" fontFamily="monospace" fontWeight="bold">DESTINY</text>
            <text x="400" y="278" fill="#8b949e" fontSize="7" textAnchor="middle" fontFamily="monospace">US Lab</text>
          </g>
          {/* Columbus (ESA) */}
          <g>
            <rect x="500" y="290" width="70" height="32" fill="url(#module-grad)" stroke="#58a6ff" strokeWidth="1.5" rx="3"/>
            <text x="535" y="306" fill="#c9d1d9" fontSize="8" textAnchor="middle" fontFamily="monospace" fontWeight="bold">COLUMBUS</text>
            <text x="535" y="316" fill="#8b949e" fontSize="7" textAnchor="middle" fontFamily="monospace">ESA</text>
          </g>
          {/* Kibo (JAXA) */}
          <g>
            <rect x="500" y="214" width="70" height="32" fill="url(#module-grad)" stroke="#f85149" strokeWidth="1.5" rx="3"/>
            <text x="535" y="230" fill="#c9d1d9" fontSize="8" textAnchor="middle" fontFamily="monospace" fontWeight="bold">KIBO JEM</text>
            <text x="535" y="240" fill="#8b949e" fontSize="7" textAnchor="middle" fontFamily="monospace">JAXA</text>
          </g>
          {/* Node 3 Tranquility + Cupola */}
          <g>
            <rect x="290" y="290" width="60" height="32" fill="url(#module-grad)" stroke="#79c0ff" strokeWidth="1.5" rx="3"/>
            <text x="320" y="306" fill="#c9d1d9" fontSize="8" textAnchor="middle" fontFamily="monospace" fontWeight="bold">NODE 3</text>
            <text x="320" y="316" fill="#8b949e" fontSize="7" textAnchor="middle" fontFamily="monospace">TRANQUILITY</text>
          </g>
          <g>
            <circle cx="320" cy="340" r="10" fill="url(#module-grad)" stroke="#3fb950" strokeWidth="1.5"/>
            <text x="320" y="343" fill="#3fb950" fontSize="7" textAnchor="middle" fontFamily="monospace">CUP</text>
          </g>
          {/* Airlock Quest */}
          <g>
            <rect x="360" y="290" width="50" height="32" fill="url(#module-grad)" stroke="#4dd0e1" strokeWidth="1.5" rx="3"/>
            <text x="385" y="306" fill="#c9d1d9" fontSize="8" textAnchor="middle" fontFamily="monospace" fontWeight="bold">QUEST</text>
            <text x="385" y="316" fill="#8b949e" fontSize="7" textAnchor="middle" fontFamily="monospace">A/L</text>
          </g>
          {/* Unity Node 1 */}
          <g>
            <rect x="290" y="250" width="60" height="36" fill="url(#module-grad)" stroke="#79c0ff" strokeWidth="1.5" rx="3"/>
            <text x="320" y="272" fill="#c9d1d9" fontSize="9" textAnchor="middle" fontFamily="monospace" fontWeight="bold">UNITY</text>
          </g>
          {/* PMM Leonardo */}
          <g>
            <rect x="220" y="290" width="60" height="28" fill="url(#module-grad)" stroke="#8b949e" strokeWidth="1.5" rx="3"/>
            <text x="250" y="307" fill="#c9d1d9" fontSize="8" textAnchor="middle" fontFamily="monospace" fontWeight="bold">PMM</text>
          </g>
          {/* BEAM */}
          <g>
            <circle cx="250" cy="340" r="8" fill="url(#module-grad)" stroke="#8b949e" strokeWidth="1"/>
            <text x="250" y="343" fill="#8b949e" fontSize="6" textAnchor="middle" fontFamily="monospace">BEAM</text>
          </g>

          {/* Russian Segment (right of USOS center) */}
          <g>
            <rect x="560" y="250" width="70" height="36" fill="url(#module-grad-rus)" stroke="#ff9800" strokeWidth="1.5" rx="3"/>
            <text x="595" y="267" fill="#ff9800" fontSize="9" textAnchor="middle" fontFamily="monospace" fontWeight="bold">ZARYA</text>
            <text x="595" y="278" fill="#8b949e" fontSize="7" textAnchor="middle" fontFamily="monospace">FGB</text>
          </g>
          <g>
            <rect x="630" y="250" width="70" height="36" fill="url(#module-grad-rus)" stroke="#ff9800" strokeWidth="1.5" rx="3"/>
            <text x="665" y="267" fill="#ff9800" fontSize="9" textAnchor="middle" fontFamily="monospace" fontWeight="bold">ZVEZDA</text>
            <text x="665" y="278" fill="#8b949e" fontSize="7" textAnchor="middle" fontFamily="monospace">SM</text>
          </g>
          <g>
            <rect x="593" y="214" width="34" height="30" fill="url(#module-grad-rus)" stroke="#ff9800" strokeWidth="1" rx="2"/>
            <text x="610" y="232" fill="#ff9800" fontSize="7" textAnchor="middle" fontFamily="monospace">POISK</text>
          </g>
          <g>
            <rect x="593" y="292" width="34" height="30" fill="url(#module-grad-rus)" stroke="#ff9800" strokeWidth="1" rx="2"/>
            <text x="610" y="310" fill="#ff9800" fontSize="7" textAnchor="middle" fontFamily="monospace">NAUKA</text>
          </g>
          <g>
            <rect x="555" y="292" width="34" height="30" fill="url(#module-grad-rus)" stroke="#ff9800" strokeWidth="1" rx="2"/>
            <text x="572" y="310" fill="#ff9800" fontSize="7" textAnchor="middle" fontFamily="monospace">RASS</text>
          </g>
          <g>
            <rect x="630" y="292" width="34" height="30" fill="url(#module-grad-rus)" stroke="#ff9800" strokeWidth="1" rx="2"/>
            <text x="647" y="310" fill="#ff9800" fontSize="7" textAnchor="middle" fontFamily="monospace">PRIC</text>
          </g>

          {/* SGANT (Ku-Band antenna) on Z1 truss */}
          <g>
            <circle cx="470" cy="180" r="10" fill="none" stroke="#58a6ff" strokeWidth="1.5"/>
            <circle cx="470" cy="180" r="5" fill="#58a6ff44"/>
            <text x="490" y="183" fill="#58a6ff" fontSize="8" fontFamily="monospace">SGANT (Ku)</text>
            <circle cx="455" cy="180" r="2" fill={ledActive}>
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.5s" repeatCount="indefinite"/>
            </circle>
          </g>

          {/* RFG-2 (S-Band Port) on P1 truss */}
          <g>
            <circle cx="285" cy="190" r="7" fill="none" stroke="#58a6ff" strokeWidth="1.2"/>
            <line x1="285" y1="195" x2="285" y2="200" stroke="#58a6ff" strokeWidth="1"/>
            <text x="255" y="182" fill="#58a6ff" fontSize="7" fontFamily="monospace">RFG-2 (S)</text>
            <circle cx="278" cy="190" r="1.8" fill={ledActive}>
              <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
            </circle>
          </g>

          {/* RFG-1 (S-Band Stbd) on S1 truss */}
          <g>
            <circle cx="715" cy="190" r="7" fill="none" stroke="#58a6ff" strokeWidth="1.2"/>
            <line x1="715" y1="195" x2="715" y2="200" stroke="#58a6ff" strokeWidth="1"/>
            <text x="725" y="182" fill="#58a6ff" fontSize="7" fontFamily="monospace">RFG-1 (S)</text>
            <circle cx="722" cy="190" r="1.8" fill={ledActive}>
              <animate attributeName="opacity" values="0.3;1;0.3" dur="2s" repeatCount="indefinite"/>
            </circle>
          </g>

          {/* UHF Antenna (EVA comms) on Lab/Columbus area */}
          <g>
            <rect x="428" y="242" width="4" height="8" fill="#f0883e"/>
            <line x1="426" y1="242" x2="434" y2="242" stroke="#f0883e" strokeWidth="1"/>
            <line x1="425" y1="245" x2="435" y2="245" stroke="#f0883e" strokeWidth="1"/>
            <text x="400" y="238" fill="#f0883e" fontSize="7" fontFamily="monospace">UHF (EVA)</text>
            <circle cx="438" cy="246" r="1.8" fill={ledActive}>
              <animate attributeName="opacity" values="0.3;1;0.3" dur="1.8s" repeatCount="indefinite"/>
            </circle>
          </g>

          {/* Ka-Band ILLUMA-T on Columbus Bartolomeo */}
          <g>
            <circle cx="535" cy="336" r="5" fill="none" stroke="#a371f7" strokeWidth="1"/>
            <line x1="535" y1="322" x2="535" y2="331" stroke="#a371f7" strokeWidth="0.8"/>
            <text x="545" y="340" fill="#a371f7" fontSize="7" fontFamily="monospace">ILLUMA-T (Ka)</text>
            <circle cx="539" cy="336" r="1.5" fill={ledActive}>
              <animate attributeName="opacity" values="0.3;1;0.3" dur="2.2s" repeatCount="indefinite"/>
            </circle>
          </g>

          {/* TDRS relay indicator (up-arrow to GEO) */}
          <g transform="translate(470, 40)">
            <text x="0" y="0" fill="#58a6ff" fontSize="8" textAnchor="middle" fontFamily="monospace">↑ TDRS GEO</text>
            <text x="0" y="10" fill="#6e7681" fontSize="7" textAnchor="middle" fontFamily="monospace">36,000 km</text>
            <line x1="-30" y1="18" x2="-30" y2="135" stroke="#58a6ff" strokeWidth="0.5" strokeDasharray="2,3" opacity="0.5"/>
            <line x1="30" y1="18" x2="30" y2="135" stroke="#58a6ff" strokeWidth="0.5" strokeDasharray="2,3" opacity="0.5"/>
          </g>

          {/* CMG Z1 truss */}
          <g>
            <rect x="430" y="164" width="40" height="22" fill="url(#module-grad)" stroke="#a371f7" strokeWidth="1"/>
            <text x="450" y="179" fill="#a371f7" fontSize="7" textAnchor="middle" fontFamily="monospace">CMG×4</text>
          </g>

          {/* SSRMS Canadarm2 sketch */}
          <g>
            <path d="M 470,260 Q 410,150 300,180" fill="none" stroke="#79c0ff" strokeWidth="2.5" strokeLinecap="round"/>
            <circle cx="300" cy="180" r="4" fill="#79c0ff"/>
            <text x="305" y="172" fill="#79c0ff" fontSize="8" fontFamily="monospace">SSRMS</text>
          </g>

          {/* Docking Ports with LEDs */}
          {[
            {x:470,y:240,key:"harmony_zen",lbl:"FWD-Z"},
            {x:470,y:296,key:"harmony_fwd",lbl:"FWD"},
            {x:320,y:250,key:"unity_nad",lbl:"NAD"},
            {x:610,y:214,key:"poisk_zen",lbl:"ZEN"},
            {x:572,y:322,key:"rassvet_nad",lbl:"NAD"},
            {x:700,y:268,key:"zvezda_aft",lbl:"AFT"},
            {x:610,y:322,key:"nauka_nad",lbl:"NAD"},
          ].map(function(port,i){
            const p = ports[port.key];
            const st = portStatus(p);
            return (
              <g key={port.key} onMouseEnter={function(){setHighlight(port.key);}} onMouseLeave={function(){setHighlight(null);}} style={{cursor:"pointer"}}>
                <circle cx={port.x} cy={port.y} r="6" fill={st.color} opacity="0.9" filter={"drop-shadow("+st.glow+")"}>
                  <animate attributeName="opacity" values="0.5;1;0.5" dur={p.docked?"1.5s":"3s"} repeatCount="indefinite"/>
                </circle>
                <circle cx={port.x} cy={port.y} r="3" fill="#0a0e13"/>
                <circle cx={port.x} cy={port.y} r="1.5" fill={st.color}/>
              </g>
            );
          })}

          {/* Legend in bottom-left corner of SVG */}
          <g transform="translate(20, 370)">
            <text x="0" y="0" fill="#8b949e" fontSize="9" fontFamily="monospace" fontWeight="bold">LEGEND</text>
            <circle cx="10" cy="14" r="4" fill={ledActive}/>
            <text x="20" y="17" fill="#8b949e" fontSize="8" fontFamily="monospace">DOCKED</text>
            <circle cx="80" cy="14" r="4" fill={ledRsvd}/>
            <text x="90" y="17" fill="#8b949e" fontSize="8" fontFamily="monospace">RESERVED</text>
            <circle cx="160" cy="14" r="4" fill={ledFree}/>
            <text x="170" y="17" fill="#8b949e" fontSize="8" fontFamily="monospace">FREE</text>
          </g>
          <g transform="translate(300, 370)">
            <rect x="0" y="8" width="20" height="10" fill="#58a6ff22" stroke="#58a6ff66"/>
            <text x="26" y="17" fill="#58a6ff" fontSize="8" fontFamily="monospace">SOLAR ARRAYS (8)</text>
            <rect x="140" y="8" width="20" height="10" fill="#d2992222" stroke="#d2992266"/>
            <text x="166" y="17" fill="#d29922" fontSize="8" fontFamily="monospace">RADIATORS</text>
          </g>
          <g transform="translate(600, 370)">
            <rect x="0" y="8" width="20" height="10" fill="url(#module-grad)" stroke="#79c0ff"/>
            <text x="26" y="17" fill="#8b949e" fontSize="8" fontFamily="monospace">USOS</text>
            <rect x="70" y="8" width="20" height="10" fill="url(#module-grad-rus)" stroke="#ff9800"/>
            <text x="96" y="17" fill="#8b949e" fontSize="8" fontFamily="monospace">ROS</text>
            <circle cx="140" cy="13" r="5" fill="none" stroke="#58a6ff"/>
            <text x="150" y="17" fill="#8b949e" fontSize="8" fontFamily="monospace">ANTENNAS</text>
            <text x="220" y="17" fill="#79c0ff" fontSize="8" fontFamily="monospace">— SSRMS</text>
          </g>
        </svg>
      </div>

      {/* Port status list */}
      <div style={{marginTop:10,display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(230px,1fr))",gap:6}}>
        {Object.keys(ports).map(function(key){
          const p = ports[key];
          const st = portStatus(p);
          const active = highlight === key;
          return (
            <div key={key} style={{
              padding:"6px 10px",
              background:active?"#161b22":"#0a0e13",
              border:"1px solid "+(active?st.color+"66":"#21262d"),
              borderLeft:"2px solid "+st.color,
              borderRadius:3,
              transition:"all .15s"
            }}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
                <span style={{fontSize:10,color:"#c9d1d9",fontWeight:600}}>{p.label}</span>
                <span style={{fontSize:8,padding:"1px 5px",border:"1px solid "+st.color+"66",color:st.color,borderRadius:2,fontWeight:700,letterSpacing:0.5,textShadow:"0 0 4px "+st.color+"66"}}>● {st.label}</span>
              </div>
              <div style={{fontSize:9,color:"#8b949e"}}>
                {p.vehicle || "— available —"}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<StationCommander/>);
</script>
</body>
</html>
